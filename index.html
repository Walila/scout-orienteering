<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#3A6B35">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="童軍闖關">
  <title>童軍定向闖關 · 關主手冊</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="header-top">
        <span class="header-emblem">⚜️</span>
        <div>
          <h1>童軍定向闖關</h1>
          <p class="site-subtitle">關主手冊 · 戶外方位教學</p>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="container">

      <div class="overview-banner">
        <span>🎯</span>
        <span>對象：國小二～六年級 &nbsp;｜&nbsp; 每關 4～5 分鐘（輪站）</span>
      </div>

      <!-- 全場關主原則 -->
      <section class="principles-section">
        <h2>全場關主原則</h2>
        <ul class="principles-list">
          <li class="principle-item">
            <span class="principle-star">⭐</span>
            <strong>不給失敗</strong>
            <span class="principle-note">修正就算過</span>
          </li>
          <li class="principle-item">
            <span class="principle-star">⭐</span>
            <strong>少講多玩</strong>
            <span class="principle-note">說明 ≤ 30 秒</span>
          </li>
          <li class="principle-item">
            <span class="principle-star">⭐</span>
            <strong>用問的</strong>
            <span class="principle-note">「你覺得呢？」</span>
          </li>
          <li class="principle-item">
            <span class="principle-star">⭐</span>
            <strong>節奏優先</strong>
            <span class="principle-note">不卡關最重要</span>
          </li>
        </ul>

        <div class="principle-item" style="margin-top:1rem; border-left-color: var(--color-primary); background: var(--color-bg);">
          <span>🎯</span>
          <span class="principle-note" style="font-weight:700; font-style:italic; font-size:1.05rem;">「不是要他們全對，是讓他們用身體學會方向」</span>
        </div>
      </section>

      <!-- 選擇關卡 -->
      <section class="stations-section">
        <h2>選擇關卡</h2>
        <nav class="station-grid" aria-label="關卡導覽">
          <a href="station-a.html" class="station-btn" aria-label="A關：方位衝刺">
            <span class="station-letter">A</span>
            <span class="station-name">方位衝刺</span>
          </a>
          <a href="station-b.html" class="station-btn" aria-label="B關：人體羅盤拼圖">
            <span class="station-letter">B</span>
            <span class="station-name">人體羅盤拼圖</span>
          </a>
          <a href="station-c.html" class="station-btn" aria-label="C關：跳邊判斷">
            <span class="station-letter">C</span>
            <span class="station-name">跳邊判斷</span>
          </a>
          <a href="station-d.html" class="station-btn" aria-label="D關：指北針分散任務">
            <span class="station-letter">D</span>
            <span class="station-name">指北針分散任務</span>
          </a>
          <a href="station-e.html" class="station-btn" aria-label="E關：地圖轉正＋人體地圖">
            <span class="station-letter">E</span>
            <span class="station-name">地圖轉正＋人體地圖</span>
          </a>
        </nav>
      </section>

    </div>
  </main>

  <footer class="site-footer">
    <p>童軍定向教學 · 闖關遊戲</p>
  </footer>

</body>
</html>
