<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2C5428">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="童軍闖關">
  <title>B關：人體羅盤拼圖 · 童軍定向</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="station-header">
    <div class="container">
      <a href="index.html" class="back-btn" aria-label="返回首頁">← 返回</a>
      <div class="station-title-group">
        <span class="station-badge">B 關</span>
        <h1>人體羅盤拼圖</h1>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="content-cards">

        <!-- 準備 -->
        <section class="content-card" id="prep">
          <div class="card-header">
            <span class="card-icon">🎒</span>
            <h2>準備</h2>
          </div>
          <div class="card-body">
            <ul class="prep-list">
              <li>地上標記：北 / 東 / 南 / 西</li>
              <li>方向卡（名片紙）：東西南北＋斜角方位</li>
              <li>方向卡可含角度（0° / 45° / 90° / 135° / 180° …）</li>
            </ul>
          </div>
        </section>

        <!-- 關卡教學 -->
        <section class="content-card" id="teaching">
          <div class="card-header">
            <span class="card-icon">🎮</span>
            <h2>關卡教學</h2>
          </div>
          <div class="card-body">

            <div class="teaching-block is-open">
              <button class="block-toggle" aria-expanded="true">
                <span class="block-title">🗣️ 開場白</span>
                <span class="block-chevron">▼</span>
              </button>
              <div class="block-body">
                <blockquote class="spiel">「地上是基準，請照卡片站對位置！」</blockquote>
              </div>
            </div>

            <div class="teaching-block is-open">
              <button class="block-toggle" aria-expanded="true">
                <span class="block-title">🎮 玩法</span>
                <span class="block-chevron">▼</span>
              </button>
              <div class="block-body">
                <ol class="gameplay-steps">
                  <li>小朋友從卡堆抽一張方向卡</li>
                  <li>依照卡片上的方位，站到地上對應的位置</li>
                </ol>
              </div>
            </div>

            <div class="teaching-block is-open">
              <button class="block-toggle" aria-expanded="true">
                <span class="block-title">🔥 重點問題</span>
                <span class="block-chevron">▼</span>
              </button>
              <div class="block-body">
                <ul class="key-list">
                  <li>「誰在你右邊？」</li>
                  <li>「誰在你對面？」</li>
                  <li>「東是幾度？」</li>
                </ul>
              </div>
            </div>

            <div class="teaching-block is-open">
              <button class="block-toggle" aria-expanded="true">
                <span class="block-title">❓ 引導問題</span>
                <span class="block-chevron">▼</span>
              </button>
              <div class="block-body">
                <ul class="guidance-list">
                  <li>「北在哪？」</li>
                  <li>「要不要換一下位置？」</li>
                </ul>
              </div>
            </div>


          </div>
        </section>

      </div>
    </div>
  </main>

  <footer class="station-footer">
    <a href="index.html" class="back-btn">← 返回首頁</a>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
