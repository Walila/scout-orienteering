<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2C5428">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="童軍闖關">
  <title>C關：跳邊判斷 · 童軍定向</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="station-header">
    <div class="container">
      <a href="index.html" class="back-btn" aria-label="返回首頁">← 返回</a>
      <div class="station-title-group">
        <span class="station-badge">C 關</span>
        <h1>跳邊判斷</h1>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="content-cards">

        <!-- 準備 -->
        <section class="content-card" id="prep">
          <div class="card-header">
            <span class="card-icon">🎒</span>
            <h2>準備</h2>
          </div>
          <div class="card-body">
            <ul class="prep-list">
              <li>一條線（繩子 / 地上畫線皆可）</li>
            </ul>
          </div>
        </section>

        <!-- 關卡教學 -->
        <section class="content-card" id="teaching">
          <div class="card-header">
            <span class="card-icon">🎮</span>
            <h2>關卡教學</h2>
          </div>
          <div class="card-body">

            <div class="teaching-block is-open">
              <button class="block-toggle" aria-expanded="true">
                <span class="block-title">🗣️ 開場白</span>
                <span class="block-chevron">▼</span>
              </button>
              <div class="block-body">
                <blockquote class="spiel">「右邊是對，左邊是錯！聽完題目跳邊！」</blockquote>
              </div>
            </div>

            <div class="teaching-block is-open">
              <button class="block-toggle" aria-expanded="true">
                <span class="block-title">🎮 玩法</span>
                <span class="block-chevron">▼</span>
              </button>
              <div class="block-body">
                <ol class="gameplay-steps">
                  <li>關主出題</li>
                  <li>小朋友判斷對錯，跳到對應那一側</li>
                </ol>
              </div>
            </div>

            <div class="teaching-block is-open">
              <button class="block-toggle" aria-expanded="true">
                <span class="block-title">🔥 題目列表</span>
                <span class="block-chevron">▼</span>
              </button>
              <div class="block-body">
                <ul class="key-list">
                  <li>太陽從西邊升起 &nbsp;❌</li>
                  <li>面北，右手邊是東 &nbsp;⭕</li>
                  <li>180° 是北方 &nbsp;❌</li>
                  <li>指北針紅色那端指北 &nbsp;⭕</li>
                  <li>磁鐵會影響指北針 &nbsp;⭕</li>
                </ul>
              </div>
            </div>

            <div class="teaching-block is-open">
              <button class="block-toggle" aria-expanded="true">
                <span class="block-title">❓ 引導問題</span>
                <span class="block-chevron">▼</span>
              </button>
              <div class="block-body">
                <ul class="guidance-list">
                  <li>「為什麼？」</li>
                </ul>
              </div>
            </div>

            <div class="pass-condition" role="button" tabindex="0" aria-label="點擊標記過關">
              <span class="pass-icon">✅</span>
              <div class="pass-text">
                <strong>過關條件</strong>
                <p>答對 3 題</p>
              </div>
              <span class="pass-done-label">完成！</span>
            </div>

          </div>
        </section>

      </div>
    </div>
  </main>

  <footer class="station-footer">
    <a href="index.html" class="back-btn">← 返回首頁</a>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
