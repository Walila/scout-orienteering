<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2C5428">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="童軍闖關">
  <title>A關：方位衝刺 · 童軍定向</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="station-header">
    <div class="container">
      <a href="index.html" class="back-btn" aria-label="返回首頁">← 返回</a>
      <div class="station-title-group">
        <span class="station-badge">A 關</span>
        <h1>方位衝刺</h1>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="content-cards">

        <!-- 準備 -->
        <section class="content-card" id="prep">
          <div class="card-header">
            <span class="card-icon">🎒</span>
            <h2>準備</h2>
          </div>
          <div class="card-body">
            <ul class="prep-list">
              <li>四個標示物：東北 / 東南 / 西北 / 西南</li>
            </ul>
          </div>
        </section>

        <!-- 關卡教學 -->
        <section class="content-card" id="teaching">
          <div class="card-header">
            <span class="card-icon">🎮</span>
            <h2>關卡教學</h2>
          </div>
          <div class="card-body">

            <div class="teaching-block is-open">
              <button class="block-toggle" aria-expanded="true">
                <span class="block-title">🗣️ 開場白</span>
                <span class="block-chevron">▼</span>
              </button>
              <div class="block-body">
                <blockquote class="spiel">「我這裡是北，等一下會變！」</blockquote>
              </div>
            </div>

            <div class="teaching-block is-open">
              <button class="block-toggle" aria-expanded="true">
                <span class="block-title">🎮 玩法</span>
                <span class="block-chevron">▼</span>
              </button>
              <div class="block-body">
                <ol class="gameplay-steps">
                  <li>關主喊方向（東北 / 西南 / 東南 / 西北）</li>
                  <li>小朋友跑到對應位置的標示物旁</li>
                </ol>
              </div>
            </div>

            <div class="teaching-block is-open">
              <button class="block-toggle" aria-expanded="true">
                <span class="block-title">🔥 重點玩法</span>
                <span class="block-chevron">▼</span>
              </button>
              <div class="block-body">
                <ul class="key-list">
                  <li>👉 中途改北：「現在這邊是北！」讓標示物的意義改變</li>
                  <li>👉 可加角度挑戰：「90°」、「225°」</li>
                </ul>
              </div>
            </div>

            <div class="teaching-block is-open">
              <button class="block-toggle" aria-expanded="true">
                <span class="block-title">❓ 引導問題</span>
                <span class="block-chevron">▼</span>
              </button>
              <div class="block-body">
                <ul class="guidance-list">
                  <li>「北在哪？」</li>
                  <li>「為什麼跑這裡？」</li>
                </ul>
              </div>
            </div>


          </div>
        </section>

      </div>
    </div>
  </main>

  <footer class="station-footer">
    <a href="index.html" class="back-btn">← 返回首頁</a>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
